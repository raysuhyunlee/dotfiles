#
# Plain, font-agnostic tmux config. No powerline glyphs, no fancy separators.
#

#
# Basics
#
set -g prefix C-a
unbind C-b
bind C-a send-prefix
set -g base-index 1
setw -g pane-base-index 1
set -gs escape-time 0
setw -g aggressive-resize on
set -g mouse on
setw -g mode-keys vi
set -g default-terminal "tmux-256color"

#
# Status bar (plain text, works with any font)
#
set -g status on
set -g status-interval 5
set -g status-style "bg=colour235 fg=colour250"
set -g status-left " #S "
set -g status-left-length 30
set -g status-right " %Y-%m-%d %H:%M "
set -g status-right-length 30
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "bg=colour240 fg=colour255 bold"

#
# Key bindings
#
bind r source-file ~/.tmux.conf \; display "Config reloaded"

bind \\ split-window -h                # \ |
bind | split-window -h \;\
       swap-pane -U
bind - split-window -v                # - _
bind _ split-window -v \;\
       swap-pane -U
bind -r h resize-pane -L 10           # h j k l
bind -r l resize-pane -R 10
bind -r k resize-pane -U 3
bind -r j resize-pane -D 3
bind -r H resize-pane -L              # H J K L
bind -r L resize-pane -R
bind -r K resize-pane -U
bind -r J resize-pane -D
